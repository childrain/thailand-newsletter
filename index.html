<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태국한인소식지 발행 일정 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{--bg:#f7f4ef;--paper:#fffef9;--ink:#1a1208;--muted:#7a6e5f;--border:#d4c9b0;--blue:#1a3a6b;--accent:#c8392b;--gold:#b8860b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);min-height:100vh;padding:28px 16px;}
.masthead{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:3px double var(--border);}
.flag{font-size:24px;margin-bottom:8px;}
.masthead h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--blue);}
.masthead .sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:2px;}
.card{background:var(--paper);border:1px solid var(--border);border-radius:2px;padding:24px;max-width:860px;margin:0 auto 20px;box-shadow:2px 2px 0 var(--border);}
.card-title{font-family:'Noto Serif KR',serif;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
.cg{display:flex;flex-direction:column;gap:5px;}
.cg label{font-size:11px;color:var(--muted);letter-spacing:1px;font-weight:500;}
select,input[type=number]{font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:7px 10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);border-radius:2px;appearance:none;cursor:pointer;}
.btn{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:600;padding:8px 22px;background:var(--blue);color:#fff;border:none;border-radius:2px;cursor:pointer;transition:background .2s;}
.btn:hover{background:#0f2850;}
.btn-red{background:var(--accent);}
.btn-red:hover{background:#a02a20;}
.step-table{width:100%;border-collapse:collapse;margin-top:4px;}
.step-table th{font-size:11px;color:var(--muted);letter-spacing:1px;padding:6px 8px;text-align:center;border-bottom:2px solid var(--border);font-weight:500;}
.step-table th.left{text-align:left;padding-left:10px;}
.step-table td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:center;}
.step-table input[type=number]{width:52px;text-align:center;font-size:13px;padding:4px;}
.step-table input[type=text]{font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:4px 8px;border:1px solid var(--border);background:var(--bg);color:var(--ink);border-radius:2px;width:150px;}
.hint{font-size:11px;color:var(--muted);margin-top:10px;}
.info-box{border-radius:2px;padding:10px 14px;font-size:12px;margin-top:12px;}
/* 달력 */
.cal-month-title{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;color:var(--blue);margin:16px 0 8px;padding-left:2px;}
.cal-month-title:first-child{margin-top:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border);margin-bottom:4px;}
.cal-head{background:var(--blue);color:#fff;font-size:12px;font-weight:600;padding:6px 0;text-align:center;border-right:1px solid #2a5a9b;border-bottom:1px solid #2a5a9b;}
.cal-head.su{color:#f8a0a0;}
.cal-head.sa{color:#a0c8f8;}
.cal-cell{min-height:80px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;background:var(--paper);}
.cal-cell.empty{background:var(--bg);}
.cal-cell.we{background:#faf6f0;}
.cal-num{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:3px;}
.cal-cell.we .cal-num{color:#a08060;}
.cal-cell.su-cell .cal-num{color:var(--accent);}
.ev{height:14px;margin-bottom:2px;font-size:10px;font-weight:600;color:#fff;line-height:14px;overflow:hidden;white-space:nowrap;padding:0 4px;border-radius:2px;}
.ev.mid{border-radius:0;padding:0;}
.ev.start{border-radius:3px 0 0 3px;}
.ev.end{border-radius:0 3px 3px 0;padding-right:4px;padding-left:0;}
.ev.sole{border-radius:3px;}
/* 간트 */
.gantt-wrap{overflow-x:auto;}
.gantt-tbl{border-collapse:collapse;width:100%;min-width:480px;}
.gantt-tbl th,.gantt-tbl td{border:1px solid var(--border);}
.gantt-tbl thead tr.g-title th{background:var(--blue);color:#fff;font-family:'Noto Serif KR',serif;font-size:13px;padding:7px 10px;text-align:left;}
.gantt-tbl thead tr.g-week th{background:var(--paper);font-size:11px;color:var(--muted);padding:4px 6px;text-align:center;font-weight:600;}
.gantt-tbl thead tr.g-week th.lbl{text-align:left;padding-left:10px;min-width:130px;}
.gantt-tbl thead tr.g-week th.wk{min-width:78px;}
.gantt-tbl tbody tr td{height:32px;padding:0;}
.gantt-tbl tbody tr td.g-lbl{padding:0 10px;font-size:12px;font-weight:500;white-space:nowrap;background:var(--paper);}
.gantt-tbl tbody tr td.g-lbl .sn{font-size:10px;color:var(--muted);margin-right:4px;}
.gantt-tbl tbody tr td.g-cell{position:relative;background:var(--paper);}
.g-bar{position:absolute;top:6px;bottom:6px;border-radius:3px;opacity:0.88;}
/* 타임라인 */
.tl-item{display:grid;grid-template-columns:90px 28px 1fr;}
.tl-date{text-align:right;padding:10px 8px 0 0;}
.tl-date .day{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;color:var(--blue);display:block;line-height:1.3;}
.tl-date .wd{font-size:10px;color:var(--muted);display:block;margin-top:1px;}
.tl-line{display:flex;flex-direction:column;align-items:center;}
.dot{width:11px;height:11px;border-radius:50%;background:var(--blue);border:2px solid var(--paper);outline:2px solid var(--blue);margin-top:14px;flex-shrink:0;}
.dot.accent{background:var(--accent);outline-color:var(--accent);}
.dot.gold{background:var(--gold);outline-color:var(--gold);}
.conn{width:2px;flex:1;background:var(--border);margin-top:2px;}
.tl-item:last-child .conn{display:none;}
.tl-body{padding:8px 0 14px 4px;}
.step-n{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:2px;}
.step-l{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.step-l.accent{color:var(--accent);}
.step-l.gold{color:var(--gold);}
.step-dates{font-size:12px;color:var(--blue);font-weight:500;margin-bottom:2px;}
.step-note{font-size:12px;color:var(--muted);line-height:1.5;}
.notice-box{background:var(--bg);border:1px solid var(--border);border-left:4px solid var(--blue);padding:20px;font-size:14px;line-height:2;white-space:pre-line;border-radius:0 2px 2px 0;margin-bottom:14px;word-break:keep-all;}
.notice-share{background:var(--bg);border:1px solid var(--border);border-left:4px solid var(--blue);padding:20px;font-size:14px;line-height:2;white-space:pre-line;border-radius:0 2px 2px 0;word-break:keep-all;}
.row-end{display:flex;gap:10px;justify-content:flex-end;align-items:center;}
.ok{font-size:12px;color:var(--accent);opacity:0;transition:opacity .3s;}
.ok.show{opacity:1;}
.export-opts{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px;}
.chk-item{display:flex;align-items:center;gap:7px;font-size:14px;cursor:pointer;}
.chk-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);}
.badge{display:inline-block;background:var(--blue);color:#fff;font-family:'Noto Serif KR',serif;font-size:13px;padding:2px 14px;border-radius:20px;margin-bottom:16px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-box{width:16px;height:10px;border-radius:2px;opacity:0.88;}
footer{text-align:center;font-size:11px;color:var(--muted);margin-top:28px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="masthead">
  <div class="flag">🇹🇭 🇰🇷</div>
  <h1>태국한인소식지 발행 일정 생성기</h1>
  <div class="sub">MONTHLY NEWSLETTER SCHEDULE GENERATOR</div>
</div>

<div class="card">
  <div class="card-title">작업 월 선택</div>
  <div class="controls">
    <div class="cg"><label>작업 연도</label><select id="selY"></select></div>
    <div class="cg"><label>작업 월</label><select id="selM"></select></div>
    <div class="cg">
      <label>호수 <span style="font-size:10px;color:var(--muted);">(자동계산·수정가능)</span></label>
      <input type="number" id="issueNo" min="1" max="99" style="width:78px;">
    </div>
    <button class="btn" onclick="generate()">일정 생성</button>
  </div>
  <div id="issueInfo" class="info-box"></div>
</div>

<div class="card">
  <div class="card-title">단계별 일정 설정 <span style="font-size:11px;font-weight:400;letter-spacing:0;color:var(--muted);">※ 수정 후 일정 생성 버튼을 누르세요</span></div>
  <table class="step-table">
    <thead><tr>
      <th style="width:28px;">#</th>
      <th class="left">단계명</th>
      <th>시작일</th>
      <th>종료일</th>
      <th>색상</th>
    </tr></thead>
    <tbody id="stepBody"></tbody>
  </table>
  <div class="hint">※ 토·일은 자동으로 다음 월요일로 보정됩니다. 단일 이벤트는 시작일=종료일로 설정하세요. 월말을 넘어가는 날짜(예: 30→5월1일)도 자동 처리됩니다.</div>
</div>

<div id="result" style="max-width:860px;margin:0 auto;"></div>
<footer>태국한인소식지 편집부</footer>

<script>
var WD=['일','월','화','수','목','금','토'];

var STEPS=[
  {label:'기사 작성 및 원고 취합', start:1,  end:12, color:'#6a9fd8', dotcls:'',       note:'각 기고자 원고 작성 및 취합 기간'},
  {label:'원고 마감',              start:12, end:12, color:'#4a7fb5', dotcls:'',       note:'각 기고자 원고 제출 마감'},
  {label:'편집 준비',              start:13, end:13, color:'#7a5ea0', dotcls:'',       note:'글자수 조정 · 단락 제목 지정 (편집책임자)'},
  {label:'편집 작업',              start:14, end:20, color:'#5a9e7a', dotcls:'',       note:'편집자 → 편집책임자 시안 전달'},
  {label:'교정',                   start:20, end:21, color:'#c8922a', dotcls:'',       note:'태국한인회 교정 검토 마감'},
  {label:'인쇄 발주',              start:22, end:22, color:'#c8392b', dotcls:'accent', note:'인쇄소에 최종 파일 전달'},
  {label:'인쇄·제본',              start:22, end:29, color:'#7a6e9e', dotcls:'',       note:'책 수령 및 포장'},
  {label:'태국 발송',              start:30, end:30, color:'#b8860b', dotcls:'gold',   note:'항공 탁송 출발'},
];

// 호수 자동계산: 발행월 2025-12=1호
function calcIssue(wy,wm){
  var pm=wm===12?1:wm+1, py=wm===12?wy+1:wy;
  var n=(py*12+pm)-(2025*12+12)+1;
  return n>0?n:null;
}

function updateIssueDefault(){
  var wy=+document.getElementById('selY').value;
  var wm=+document.getElementById('selM').value;
  var issue=calcIssue(wy,wm);
  var pm=wm===12?1:wm+1, py=wm===12?wy+1:wy;
  var infoEl=document.getElementById('issueInfo');
  if(issue===null){
    document.getElementById('issueNo').value=0;
    infoEl.style.cssText='background:#fff3e0;border:1px solid #f0c080;color:#8a5000;border-radius:2px;padding:10px 14px;font-size:12px;margin-top:12px;';
    infoEl.innerHTML='⚠️ 선택한 발행호는 <strong>창간준비호</strong> 기간입니다. (정식 발행: 2025년 12월부터 제1호)';
  } else {
    document.getElementById('issueNo').value=issue;
    infoEl.style.cssText='background:#eef3fa;border:1px solid #b0c4de;color:var(--blue);border-radius:2px;padding:10px 14px;font-size:12px;margin-top:12px;';
    infoEl.innerHTML='📌 작업월 <strong>'+wy+'년 '+wm+'월</strong> → 발행호: <strong>'+py+'년 '+pm+'월호 (제'+issue+'호)</strong> <span style="color:var(--muted);font-size:11px;">호수를 직접 수정할 수 있습니다</span>';
  }
}

function getStepsFromInputs(){
  var rows=document.getElementById('stepBody').querySelectorAll('tr');
  rows.forEach(function(tr,i){
    var inp=tr.querySelectorAll('input');
    STEPS[i].label=inp[0].value;
    STEPS[i].start=parseInt(inp[1].value)||STEPS[i].start;
    STEPS[i].end=parseInt(inp[2].value)||STEPS[i].end;
    STEPS[i].color=inp[3].value;
  });
}

function renderStepTable(){
  var tb=document.getElementById('stepBody');
  tb.innerHTML='';
  STEPS.forEach(function(s,i){
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td style="font-size:11px;color:var(--muted);">'+('0'+(i+1)).slice(-2)+'</td>'
      +'<td style="text-align:left;padding-left:8px;"><input type="text" value="'+s.label+'"></td>'
      +'<td><input type="number" min="1" max="60" value="'+s.start+'"></td>'
      +'<td><input type="number" min="1" max="60" value="'+s.end+'"></td>'
      +'<td><input type="color" value="'+s.color+'" style="width:36px;height:28px;border:1px solid var(--border);border-radius:3px;cursor:pointer;padding:1px;"></td>';
    tb.appendChild(tr);
  });
}

var selY=document.getElementById('selY');
var selM=document.getElementById('selM');
var now=new Date();
for(var y=2025;y<=2028;y++){
  var o=document.createElement('option');o.value=y;o.text=y+'년';
  if(y===now.getFullYear())o.selected=true; selY.appendChild(o);
}
for(var m=1;m<=12;m++){
  var o=document.createElement('option');o.value=m;o.text=m+'월';
  if(m===now.getMonth()+1)o.selected=true; selM.appendChild(o);
}
selY.addEventListener('change',updateIssueDefault);
selM.addEventListener('change',updateIssueDefault);

// ── 핵심: 날짜를 Date 객체로만 다루는 함수들 ──

// 작업월 wy/wm 기준, start(일) 입력 → 평일 보정된 Date 객체 반환
// 월말 초과(예: 4월 30일→5월로) 자동 처리
function toDate(wy,wm,d){
  var dt=new Date(wy,wm-1,d); // JS Date가 월 초과 자동 처리
  var w=dt.getDay();
  if(w===0) dt.setDate(dt.getDate()+1);
  else if(w===6) dt.setDate(dt.getDate()+2);
  return dt;
}

// Date → "M월 D일(요일)" 문자열
function fmtDt(dt){
  return (dt.getMonth()+1)+'월 '+dt.getDate()+'일('+WD[dt.getDay()]+')';
}

// Date → "M/D" 문자열
function fmtShort(dt){
  return (dt.getMonth()+1)+'/'+dt.getDate();
}

// 두 Date가 같은 날인지
function sameDay(a,b){
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}

// Date를 YYYYMMDD 정수로 (비교용)
function toInt(dt){ return dt.getFullYear()*10000+(dt.getMonth()+1)*100+dt.getDate(); }

// 날짜 범위 내 모든 Date 목록
function dateRange(ds,de){
  var list=[], cur=new Date(ds);
  while(toInt(cur)<=toInt(de)){
    list.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  return list;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function generate(){
  getStepsFromInputs();
  var wy=+selY.value, wm=+selM.value;
  var issue=+document.getElementById('issueNo').value;
  var pm=wm===12?1:wm+1, py=wm===12?wy+1:wy;

  // 각 스텝을 Date 객체 기반으로 변환
  var steps=STEPS.map(function(s,i){
    var ds=toDate(wy,wm,s.start);
    var de=toDate(wy,wm,s.end);
    if(toInt(de)<toInt(ds)) de=new Date(ds);
    return {
      label:s.label, color:s.color, dotcls:s.dotcls, note:s.note,
      ds:ds, de:de,
      single:sameDay(ds,de)
    };
  });

  var legend='<div class="legend">';
  steps.forEach(function(s){legend+='<div class="leg-item"><div class="leg-box" style="background:'+s.color+';"></div>'+s.label+'</div>';});
  legend+='</div>';

  // 전체 날짜 범위: 작업월 1일 ~ 마지막 스텝 종료일
  var rangeStart=new Date(wy,wm-1,1);
  var rangeEnd=steps[steps.length-1].de;

  var calHTML  =buildCal(rangeStart,rangeEnd,steps,py,pm,issue,wy,wm);
  var ganttHTML=buildGantt(rangeStart,rangeEnd,steps,py,pm,issue,wy,wm);
  var tlHTML   =buildTimeline(steps);
  var extraEl=document.getElementById('extraMsg');
  var extraTxt=extraEl&&extraEl.value?extraEl.value:'';
  var notice   =buildNotice(py,pm,issue,steps,wy,wm,extraTxt);

  document.getElementById('result').innerHTML=
    '<div class="card"><div class="card-title">달력형 발행 일정</div>'+calHTML+legend+'</div>'
   +'<div class="card"><div class="card-title">간트차트</div>'+ganttHTML+legend+'</div>'
   +'<div class="card"><div class="card-title">발행 일정표</div>'
   +'<div class="badge">'+py+'년 '+pm+'월호 · 제'+issue+'호</div>'+tlHTML+'</div>'
   +'<div class="card"><div class="card-title">공지사항</div>'
   +'<div class="notice-box" id="nt">'+esc(notice)+'</div>'
   +'<div style="margin-top:12px;margin-bottom:6px;font-size:11px;color:var(--muted);letter-spacing:1px;">추가 문구 입력 <span style="font-weight:400;">(공지문 하단에 추가됩니다)</span></div>'
   +'<div id="extraWrap"></div>'
   +'<div class="row-end" style="margin-top:10px;"><span class="ok" id="ok">✓ 복사!</span>'
   +'<button class="btn btn-red" onclick="copyNotice()">📋 공지문 복사</button></div></div>'
   +'<div class="card"><div class="card-title">HTML 내보내기</div>'
   +'<div class="export-opts">'
   +'<label class="chk-item"><input type="checkbox" id="chkCal" checked> 📅 달력</label>'
   +'<label class="chk-item"><input type="checkbox" id="chkGantt" checked> 📊 간트차트</label>'
   +'<label class="chk-item"><input type="checkbox" id="chkTl" checked> 📋 발행 일정표</label>'
   +'<label class="chk-item"><input type="checkbox" id="chkNotice" checked> 💬 공지사항</label>'
   +'</div>'
   +'<button class="btn" style="font-size:14px;padding:10px 32px;" '
   +'onclick="doExport('+py+','+pm+','+issue+')">🗂️ 공유용 HTML 내보내기</button></div>';

  // textarea 직접 생성 (따옴표 충돌 방지)
  var wrap=document.getElementById('extraWrap');
  if(wrap){
    var prev=document.getElementById('extraMsg');
    var prevVal=prev?prev.value:'';
    var ta=document.createElement('textarea');
    ta.id='extraMsg';
    ta.placeholder='예) ※ 이번 호 특집 기고 모집 중입니다. 많은 참여 부탁드립니다!';
    ta.value=prevVal;
    ta.style.cssText='width:100%;height:80px;font-family:sans-serif;font-size:13px;padding:10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);border-radius:2px;resize:vertical;line-height:1.7;';
    wrap.innerHTML='';
    wrap.appendChild(ta);
  }
  window._ex={py:py,pm:pm,issue:issue,steps:steps,wy:wy,wm:wm,
    notice:notice,calHTML:calHTML,ganttHTML:ganttHTML,tlHTML:tlHTML,legend:legend};
}

// ── 달력 빌더 ──
function buildCal(rangeStart,rangeEnd,steps,py,pm,issue,wy,wm){
  var badge='<div style="margin-bottom:12px;"><span class="badge">'+py+'년 '+pm+'월호 · 제'+issue+'호 (작업월: '+wy+'년 '+wm+'월)</span></div>';

  // 날짜→이벤트 맵 (toInt 키)
  var evMap={};
  steps.forEach(function(s){
    var list=dateRange(s.ds,s.de);
    list.forEach(function(dt,i){
      var key=toInt(dt);
      if(!evMap[key])evMap[key]=[];
      var type=s.single?'sole':i===0?'start':i===list.length-1?'end':'mid';
      evMap[key].push({label:s.label,color:s.color,type:type});
    });
  });

  // 표시할 월 목록 생성
  var months=[];
  var cur=new Date(rangeStart.getFullYear(),rangeStart.getMonth(),1);
  var endMonth=new Date(rangeEnd.getFullYear(),rangeEnd.getMonth(),1);
  while(toInt(cur)<=toInt(endMonth)){
    months.push({y:cur.getFullYear(),m:cur.getMonth()+1});
    cur.setMonth(cur.getMonth()+1);
  }

  var html=badge;
  months.forEach(function(mo){
    var dim=new Date(mo.y,mo.m,0).getDate();
    var firstDow=new Date(mo.y,mo.m-1,1).getDay();
    html+='<div class="cal-month-title">'+mo.y+'년 '+mo.m+'월</div>';
    html+='<div class="cal-grid">';
    ['일','월','화','수','목','금','토'].forEach(function(h,i){
      html+='<div class="cal-head'+(i===0?' su':i===6?' sa':'')+'">'+h+'</div>';
    });
    for(var i=0;i<firstDow;i++) html+='<div class="cal-cell empty"></div>';
    for(var d=1;d<=dim;d++){
      var dt=new Date(mo.y,mo.m-1,d);
      var dow=dt.getDay();
      var we=dow===0||dow===6;
      var cls='cal-cell'+(we?' we':'')+(dow===0?' su-cell':'');
      // rangeStart 이전이거나 rangeEnd 이후면 흐리게
      var outOfRange=toInt(dt)<toInt(rangeStart)||toInt(dt)>toInt(rangeEnd);
      if(outOfRange) cls+=' empty';
      html+='<div class="'+cls+'"><div class="cal-num" style="'+(outOfRange?'opacity:0.3;':'')+'">'+d+'</div>';
      if(!outOfRange){
        var key=toInt(dt);
        (evMap[key]||[]).forEach(function(ev){
          var showLabel=ev.type==='start'||ev.type==='sole';
          html+='<div class="ev '+ev.type+'" style="background:'+ev.color+';">'+(showLabel?ev.label:'&nbsp;')+'</div>';
        });
      }
      html+='</div>';
    }
    var filled=firstDow+dim;
    var remainder=filled%7===0?0:7-(filled%7);
    for(var r=0;r<remainder;r++) html+='<div class="cal-cell empty"></div>';
    html+='</div>';
  });
  return html;
}

// ── 간트 빌더 ──
function buildGantt(rangeStart,rangeEnd,steps,py,pm,issue,wy,wm){
  var badge='<div style="margin-bottom:12px;"><span class="badge">'+py+'년 '+pm+'월호 · 제'+issue+'호 (작업월: '+wy+'년 '+wm+'월)</span></div>';

  // 주 단위로 쪼개기 (월요일 기준)
  var weeks=[];
  var cur=new Date(rangeStart);
  // 해당 주의 월요일로 이동
  var dow=(cur.getDay()+6)%7; // 월=0
  cur.setDate(cur.getDate()-dow);
  while(toInt(cur)<=toInt(rangeEnd)){
    var wEnd=new Date(cur); wEnd.setDate(wEnd.getDate()+6);
    weeks.push({s:new Date(cur),e:new Date(wEnd)});
    cur.setDate(cur.getDate()+7);
  }

  var h1='<tr class="g-title"><th colspan="'+(weeks.length+1)+'">'+py+'년 '+pm+'월호 · 제'+issue+'호 | 작업월: '+wy+'년 '+wm+'월</th></tr>';
  var h2='<tr class="g-week"><th class="lbl">단계</th>';
  weeks.forEach(function(w){
    h2+='<th class="wk">'+fmtShort(w.s)+'~'+fmtShort(w.e)+'</th>';
  });
  h2+='</tr>';

  var rows='';
  steps.forEach(function(s,i){
    rows+='<tr><td class="g-lbl"><span class="sn">'+('0'+(i+1)).slice(-2)+'</span>'+s.label+'</td>';
    weeks.forEach(function(w){
      var os=toInt(s.ds)>=toInt(w.s)?s.ds:w.s;
      var oe=toInt(s.de)<=toInt(w.e)?s.de:w.e;
      var cell='<td class="g-cell">';
      if(toInt(os)<=toInt(oe)){
        var wLen=7;
        var leftDays=(toInt(os)-toInt(w.s));
        // 실제 날짜 차이 계산
        var osDt=new Date(Math.max(toInt(s.ds)<toInt(w.s)?toInt(w.s):toInt(s.ds)));
        var leftPct=((toInt(os)-toInt(w.s))/wLen*100).toFixed(1)+'%';
        var rightPct=((toInt(w.e)-toInt(oe))/wLen*100).toFixed(1)+'%';
        if(s.single){
          var midPct=(((toInt(s.ds)-toInt(w.s))+0.5)/wLen*100).toFixed(1)+'%';
          cell+='<div style="position:absolute;top:50%;left:'+midPct+';transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:'+s.color+';border:2px solid var(--paper);outline:2px solid '+s.color+';"></div>';
        } else {
          cell+='<div class="g-bar" style="left:'+leftPct+';right:'+rightPct+';background:'+s.color+';"></div>';
        }
      }
      rows+=cell+'</td>';
    });
    rows+='</tr>';
  });

  return badge+'<div class="gantt-wrap"><table class="gantt-tbl"><thead>'+h1+h2+'</thead><tbody>'+rows+'</tbody></table></div>';
}

// ── 타임라인 빌더 ──
function buildTimeline(steps){
  var html='<div>';
  steps.forEach(function(s,i){
    var dayStr=s.single
      ? fmtDt(s.de)
      : fmtDt(s.ds)+' ~ '+fmtDt(s.de);
    var leftStr=s.single
      ? '<span class="day">'+fmtShort(s.de)+'</span><span class="wd">'+WD[s.de.getDay()]+'요일</span>'
      : '<span class="day">'+fmtShort(s.ds)+'~'+fmtShort(s.de)+'</span><span class="wd">'+WD[s.ds.getDay()]+'~'+WD[s.de.getDay()]+'</span>';
    html+='<div class="tl-item">'
      +'<div class="tl-date">'+leftStr+'</div>'
      +'<div class="tl-line"><div class="dot '+s.dotcls+'"></div><div class="conn"></div></div>'
      +'<div class="tl-body"><div class="step-n">STEP '+('0'+(i+1)).slice(-2)+'</div>'
      +'<div class="step-l '+s.dotcls+'">'+s.label+'</div>'
      +'<div class="step-dates">'+dayStr+'</div>'
      +'<div class="step-note">'+s.note+'</div>'
      +'</div></div>';
  });
  return html+'</div>';
}

// ── 공지문 빌더 ──
function buildNotice(py,pm,issue,steps,wy,wm,extra){
  var icons=['📄','📝','✍️','🖨️','🔍','📦','📗','✈️'];
  var lines='';
  steps.forEach(function(s,i){
    var dateStr=s.single?fmtDt(s.de):fmtDt(s.ds)+' ~ '+fmtDt(s.de);
    lines+=(icons[i]||'▪')+' '+s.label+'  '+dateStr+'\n';
  });
  var base='📋 ['+py+'년 '+pm+'월호 · 제'+issue+'호 발행 일정 안내]\n\n'
    +'안녕하세요, 태국한인소식지 편집부입니다 🇹🇭🇰🇷\n\n'
    +pm+'월호 발행 일정을 아래와 같이 안내드립니다.\n'
    +'원활한 발행을 위해 각 일정을 꼭 지켜주시길 부탁드립니다 🙏\n\n'
    +'──────────────────────\n'
    +lines
    +'──────────────────────\n\n'
    +'기사 투고 및 문의사항은 편집부로 연락 주세요.\n'
    +pm+'월호도 알찬 소식지가 될 수 있도록 많은 참여 부탁드립니다! 😊';
  return extra&&extra.trim()?base+'\n\n'+extra.trim():base;
}

function copyNotice(){
  var el=document.getElementById('nt');
  if(!el)return;
  var extra=document.getElementById('extraMsg');
  var extraTxt=extra&&extra.value.trim()?'\n\n'+extra.value.trim():'';
  navigator.clipboard.writeText(el.innerText+extraTxt).then(function(){
    var ok=document.getElementById('ok');ok.classList.add('show');
    setTimeout(function(){ok.classList.remove('show');},2500);
  });
}

function doExport(py,pm,issue){
  var ex=window._ex;
  var inclCal   =document.getElementById('chkCal').checked;
  var inclGantt =document.getElementById('chkGantt').checked;
  var inclTl    =document.getElementById('chkTl').checked;
  var inclNotice=document.getElementById('chkNotice').checked;
  if(!inclCal&&!inclGantt&&!inclTl&&!inclNotice){alert('최소 하나는 선택해주세요!');return;}
  var sections='';
  if(inclCal)    sections+='<div class="card"><div class="card-title">달력형 발행 일정</div>'+ex.calHTML+ex.legend+'</div>';
  if(inclGantt)  sections+='<div class="card"><div class="card-title">간트차트</div>'+ex.ganttHTML+ex.legend+'</div>';
  if(inclTl)     sections+='<div class="card"><div class="card-title">발행 일정표</div><div class="badge">'+py+'년 '+pm+'월호 · 제'+issue+'호</div>'+ex.tlHTML+'</div>';
  var exportExtra=document.getElementById('extraMsg');
  var exportExtraTxt=exportExtra&&exportExtra.value.trim()?exportExtra.value.trim():'';
  var exportNotice=exportExtraTxt?ex.notice+'\n\n'+exportExtraTxt:ex.notice;
  if(inclNotice) sections+='<div class="card"><div class="card-title">공지사항</div><div class="notice-share">'+esc(exportNotice)+'</div></div>';
  var css=document.querySelector('style').innerHTML;
  var html='<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="UTF-8">\n'
    +'<meta name="viewport" content="width=device-width,initial-scale=1.0">\n'
    +'<title>태국한인소식지 '+py+'년 '+pm+'월호 발행 일정</title>\n'
    +'<style>'+css+'</style>\n</head>\n<body>\n'
    +'<div style="max-width:860px;margin:0 auto;padding:28px 16px;">\n'
    +'<div class="masthead"><div class="flag">🇹🇭 🇰🇷</div>'
    +'<h1>태국한인소식지</h1>'
    +'<div class="sub">'+py+'년 '+pm+'월호 · 제'+issue+'호 발행 일정</div></div>\n'
    +sections
    +'<footer style="text-align:center;font-size:11px;color:var(--muted);margin-top:28px;letter-spacing:1px;">태국한인소식지 편집부 · '+py+'</footer>\n'
    +'</div>\n</body>\n</html>';
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='태국한인소식지_'+py+'년'+pm+'월호_발행일정.html';
  a.click();URL.revokeObjectURL(url);
}
